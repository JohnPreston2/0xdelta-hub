<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0xDelta | Forensic Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --surface:   #141416;
      --surface2:  #1c1c20;
      --border:    #242428;
      --border2:   #2e2e34;
      --text:      #e8e8ea;
      --text2:     #8888a0;
      --text3:     #4a4a5e;
      --green:     #22d3a0;
      --red:       #f04a5a;
      --yellow:    #f5a623;
      --blue:      #4f8ef7;
      --purple:    #9b6dff;
      --green-bg:  rgba(34,211,160,0.08);
      --red-bg:    rgba(240,74,90,0.08);
      --yellow-bg: rgba(245,166,35,0.08);
      --blue-bg:   rgba(79,142,247,0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px;
      background: rgba(13,13,15,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .nav-brand { display: flex; align-items: center; gap: 12px; }
    .nav-logo {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: var(--blue);
      font-family: 'JetBrains Mono', monospace;
    }
    .nav-title { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
    .nav-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .nav-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      padding: 4px 10px; border-radius: 6px;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text2);
    }

    /* ── LAYOUT ── */
    .page { max-width: 1600px; margin: 0 auto; padding: 28px 24px 60px; }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }
    .section-dot { width: 8px; height: 8px; border-radius: 50%; }
    .section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); }

    /* ── TRENDING GRID ── */
    .trending-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 36px;
    }
    @media (max-width: 900px) { .trending-grid { grid-template-columns: 1fr; } }

    /* ── TOKEN CARD (trending) ── */
    .token-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .token-card:hover {
      border-color: var(--border2);
      background: var(--surface2);
    }
    .token-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .token-symbol { font-weight: 600; font-size: 14px; }
    .token-addr { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); margin-top: 2px; }
    .token-price { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; text-align: right; }
    .token-change { font-size: 11px; margin-top: 2px; text-align: right; }
    .token-meta { display: flex; gap: 16px; padding-top: 10px; border-top: 1px solid var(--border); }
    .token-meta-item { font-size: 11px; color: var(--text3); }
    .token-meta-item span { color: var(--text2); }
    .up { color: var(--green); }
    .down { color: var(--red); }

    /* ── DIVIDER ── */
    .divider { height: 1px; background: var(--border); margin: 32px 0; }

    /* ── FORENSIC SECTION ── */
    .forensic-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .forensic-title-group { display: flex; align-items: center; gap: 12px; }
    .forensic-title { font-size: 16px; font-weight: 600; }
    .forensic-count {
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text2); padding: 3px 8px; border-radius: 5px;
    }

    /* ── FORENSIC GRID ── */
    .forensic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    /* ── FORENSIC CARD ── */
    .f-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      transition: border-color 0.2s;
      position: relative;
      overflow: hidden;
    }
    .f-card:hover { border-color: var(--border2); }
    .f-card-accent {
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }

    .f-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .f-symbol { font-size: 15px; font-weight: 600; }
    .f-addr { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); margin-top: 3px; }

    .f-score-block { text-align: right; }
    .f-fhs { font-size: 22px; font-weight: 700; line-height: 1; }
    .f-fhs-label { font-size: 10px; color: var(--text3); margin-top: 2px; }

    /* badges */
    .badges { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .badge {
      font-size: 10px; font-family: 'JetBrains Mono', monospace;
      padding: 3px 8px; border-radius: 5px; font-weight: 500;
      border: 1px solid transparent;
    }
    .badge-green  { background: var(--green-bg);  color: var(--green);  border-color: rgba(34,211,160,0.2); }
    .badge-red    { background: var(--red-bg);    color: var(--red);    border-color: rgba(240,74,90,0.2); }
    .badge-yellow { background: var(--yellow-bg); color: var(--yellow); border-color: rgba(245,166,35,0.2); }
    .badge-blue   { background: var(--blue-bg);   color: var(--blue);   border-color: rgba(79,142,247,0.2); }

    /* metrics row */
    .f-metrics {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 6px; padding-top: 12px; border-top: 1px solid var(--border);
    }
    .f-metric { text-align: center; }
    .f-metric-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
    .f-metric-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; }

    /* alerts */
    .f-alerts { margin-top: 10px; }
    .f-alert {
      font-size: 10px; color: var(--red);
      background: var(--red-bg); border: 1px solid rgba(240,74,90,0.15);
      border-radius: 5px; padding: 5px 8px; margin-top: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── LOADING ── */
    .loading { color: var(--text3); font-size: 13px; padding: 20px 0; }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-logo">Δ</div>
    <div>
      <div class="nav-title">0xDelta</div>
      <div class="nav-sub mono">Forensic Intelligence Platform</div>
    </div>
  </div>
  <div id="update-timer" class="nav-badge">—</div>
</nav>

<div class="page">

  <!-- ── TRENDING ── -->
  <div class="trending-grid">
    <div>
      <div class="section-header">
        <div class="section-dot" style="background:var(--purple)"></div>
        <span class="section-title">Solana Trending</span>
      </div>
      <div id="solana-list" class="loading">Chargement...</div>
    </div>
    <div>
      <div class="section-header">
        <div class="section-dot" style="background:var(--blue)"></div>
        <span class="section-title">Base Network</span>
      </div>
      <div id="base-list" class="loading">Chargement...</div>
    </div>
    <div>
      <div class="section-header">
        <div class="section-dot" style="background:var(--red)"></div>
        <span class="section-title">🦞 OpenClaw Watchlist</span>
      </div>
      <div id="openclaw-list" class="loading">Chargement...</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- ── FORENSIC ── -->
  <div class="forensic-header">
    <div class="forensic-title-group">
      <div class="forensic-title">Forensic Intelligence</div>
      <div class="forensic-count" id="forensic-count">— tokens</div>
    </div>
    <div id="forensic-updated" class="nav-badge" style="font-size:10px">—</div>
  </div>

  <div id="forensic-grid" class="forensic-grid">
    <div class="loading">Chargement des fiches forensic...</div>
  </div>

</div>

<script>
// ── UTILS ──
function cash(n) {
  n = parseFloat(n) || 0;
  if (n >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toFixed(2);
}

function timeAgo(iso) {
  if (!iso) return '—';
  const diff = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (diff < 60) return diff + 'm ago';
  return Math.floor(diff/60) + 'h ago';
}

// ── TRENDING CARDS ──
function tokenCard(t, accent) {
  const change = parseFloat(t.price_change_24h) || 0;
  const up = change >= 0;
  return `<div class="token-card" style="border-top:2px solid ${accent}">
    <div class="token-card-header">
      <div>
        <div class="token-symbol">${t.symbol || t.name || '?'}</div>
        <div class="token-addr">${(t.pool_address||'').slice(0,14)}…</div>
      </div>
      <div>
        <div class="token-price" style="color:${accent}">$${parseFloat(t.price_usd||0).toFixed(6)}</div>
        <div class="token-change ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(change).toFixed(1)}%</div>
      </div>
    </div>
    <div class="token-meta">
      <div class="token-meta-item">MCAP <span>$${cash(t.market_cap_usd)}</span></div>
      <div class="token-meta-item">VOL <span>$${cash(t.volume_24h)}</span></div>
    </div>
  </div>`;
}

function renderTokens(tokens, id, accent) {
  const el = document.getElementById(id);
  if (!tokens || !tokens.length) { el.innerHTML = '<div class="loading">Aucune donnée</div>'; return; }
  el.innerHTML = tokens.map(t => tokenCard(t, accent)).join('');
}

function renderOpenClaw(tokens) {
  const el = document.getElementById('openclaw-list');
  if (!tokens || !tokens.length) { el.innerHTML = '<div class="loading">Watchlist vide</div>'; return; }
  el.innerHTML = tokens.map(t => {
    const change = parseFloat(t.price_change_24h) || 0;
    const live = t.pool_address !== '---' && parseFloat(t.price_usd) > 0;
    const up = change >= 0;
    return `<div class="token-card" style="border-top:2px solid var(--red);${!live?'opacity:0.5':''}">
      <div class="token-card-header">
        <div>
          <div class="token-symbol">${t.name||t.symbol||'?'}</div>
          <div class="token-addr mono">${t.symbol||''}</div>
        </div>
        <div>
          ${live
            ? `<div class="token-price" style="color:var(--red)">$${parseFloat(t.price_usd).toFixed(6)}</div>
               <div class="token-change ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(change).toFixed(1)}%</div>`
            : `<div class="token-price" style="color:var(--text3)">OFFLINE</div>`}
        </div>
      </div>
      ${live ? `<div class="token-meta">
        <div class="token-meta-item">MCAP <span>$${cash(t.market_cap_usd)}</span></div>
        <div class="token-meta-item"><span style="color:var(--red);font-size:8px">● LIVE</span></div>
      </div>` : ''}
    </div>`;
  }).join('');
}

// ── FORENSIC CARDS ──
function fhsColor(v) {
  if (v >= 7) return 'var(--green)';
  if (v >= 5) return 'var(--yellow)';
  return 'var(--red)';
}

function phaseBadge(p) {
  const map = {
    'ACCUMULATION': 'badge-green',
    'CONSOLIDATION': 'badge-yellow',
    'DISTRIBUTION': 'badge-red',
    'RUPTURE': 'badge-red',
  };
  return `<span class="badge ${map[p]||'badge-blue'}">${p}</span>`;
}

function forensicCard(t) {
  const color = fhsColor(t.fhs);
  const nbpUp = t.nbp >= 0;
  const alertsHtml = (t.alerts||[]).slice(0,2).map(a =>
    `<div class="f-alert" title="${a}">⚠ ${a}</div>`
  ).join('');

  return `<div class="f-card">
    <div class="f-card-accent" style="background:${color}"></div>
    <div class="f-card-top">
      <div>
        <div class="f-symbol">${t.symbol}</div>
        <div class="f-addr">${(t.address||'').slice(0,14)}…</div>
      </div>
      <div class="f-score-block">
        <div class="f-fhs" style="color:${color}">${t.fhs}</div>
        <div class="f-fhs-label">FHS / 10</div>
      </div>
    </div>

    <div class="badges">
      ${phaseBadge(t.phase)}
      ${t.bull_flag ? '<span class="badge badge-yellow">🚩 Bull Flag</span>' : ''}
      ${t.cp >= 60 ? '<span class="badge badge-green">CP '+t.cp+'%</span>' : ''}
      ${t.alerts && t.alerts.length > 0 ? `<span class="badge badge-red">⚠ ${t.alerts.length}</span>` : ''}
    </div>

    <div class="f-metrics">
      <div class="f-metric">
        <div class="f-metric-label">NBP</div>
        <div class="f-metric-value" style="color:${nbpUp?'var(--green)':'var(--red)'}">${nbpUp?'+':''}${t.nbp}%</div>
      </div>
      <div class="f-metric">
        <div class="f-metric-label">ICR</div>
        <div class="f-metric-value" style="color:${t.icr>1?'var(--red)':'var(--green)'}">${t.icr}</div>
      </div>
      <div class="f-metric">
        <div class="f-metric-label">CP</div>
        <div class="f-metric-value" style="color:var(--text2)">${t.cp}%</div>
      </div>
    </div>

    ${alertsHtml ? `<div class="f-alerts">${alertsHtml}</div>` : ''}
  </div>`;
}

function renderForensic(tokens) {
  const grid = document.getElementById('forensic-grid');
  const count = document.getElementById('forensic-count');
  if (!tokens || !tokens.length) {
    grid.innerHTML = '<div class="loading">Aucune fiche disponible</div>';
    return;
  }
  // Trier par FHS décroissant
  const sorted = [...tokens].sort((a,b) => b.fhs - a.fhs);
  count.textContent = sorted.length + ' tokens';
  grid.innerHTML = sorted.map(forensicCard).join('');
}

// ── LOAD DATA ──
async function loadData() {
  try {
    const res = await fetch('data.json?' + Date.now());
    const data = await res.json();
    document.getElementById('update-timer').textContent = 'Updated ' + timeAgo(data.updated_at);
    renderTokens(data.trending_solana, 'solana-list', 'var(--purple)');
    renderTokens(data.trending_base, 'base-list', 'var(--blue)');
    renderOpenClaw(data.openclaw_tokens);
  } catch(e) { console.error('data.json:', e); }
}

async function loadMemory() {
  try {
    const res = await fetch('memory.json?' + Date.now());
    const data = await res.json();
    document.getElementById('forensic-updated').textContent = 'Forensic ' + timeAgo(data.updated_at);
    renderForensic(data.tokens);
  } catch(e) { console.error('memory.json:', e); }
}

loadData();
loadMemory();
setInterval(loadData, 5 * 60 * 1000);
setInterval(loadMemory, 5 * 60 * 1000);
</script>
</body>
</html>
