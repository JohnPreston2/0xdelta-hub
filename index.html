<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0xΔ | Tactical Forensic Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --surface: #0a0a0c;
      --border: #1a1a1e;
      --border-bright: #2a2a30;
      --accent: #bfff00; /* Phosphor Green */
      --text-main: #f0f0f0;
      --text-dim: #66666e;
      --text-ghost: #333338;
      
      --red: #ff3e3e;
      --blue: #0070ff;
      --yellow: #ffb800;
      
      --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }

    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Texture Overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: var(--grain);
      opacity: 0.03;
      pointer-events: none;
      z-index: 100;
    }

    .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: -0.02em; }

    /* ── HEADER TACTIQUE ── */
    header {
      height: 60px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: relative;
    }

    .logo-area { display: flex; align-items: center; gap: 15px; }
    .logo-box {
      width: 32px; height: 32px;
      background: var(--accent);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      clip-path: polygon(20% 0%, 100% 0%, 100% 80%, 80% 100%, 0% 100%, 0% 20%);
    }

    .status-ticker {
      display: flex;
      gap: 20px;
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .status-item span { color: var(--accent); margin-right: 4px; }

    /* ── LAYOUT PRINCIPAL ── */
    .main-grid {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      flex: 1;
      overflow: hidden;
    }

    /* ── COLONNE GAUCHE : WATCHLIST ── */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: linear-gradient(to right, var(--surface), transparent);
    }

    .sidebar-label {
      padding: 16px 20px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-ghost);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex;
      justify-content: space-between;
    }

    .token-list { overflow-y: auto; flex: 1; }
    .token-item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
    }

    .token-item:hover { background: rgba(191, 255, 0, 0.05); }
    .token-item.active {
      background: rgba(191, 255, 0, 0.1);
      border-left: 4px solid var(--accent);
    }

    .token-name { font-weight: 700; font-size: 15px; }
    .token-meta { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-top: 2px; }
    .token-score {
      font-family: 'JetBrains Mono';
      font-weight: 700;
      font-size: 16px;
      text-align: right;
    }

    /* ── CENTRE : INTELLIGENCE ── */
    .content-area {
      overflow-y: auto;
      padding: 40px;
      position: relative;
    }

    .intel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 40px;
    }

    .intel-title h1 {
      font-size: 48px;
      font-weight: 800;
      line-height: 0.9;
      text-transform: uppercase;
      letter-spacing: -0.04em;
    }

    .addr-pill {
      background: var(--surface);
      border: 1px solid var(--border-bright);
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 11px;
      color: var(--text-dim);
      display: inline-block;
      margin-top: 10px;
    }

    .fhs-radar {
      position: relative;
      width: 120px; height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border-bright);
      border-radius: 50%;
    }

    .fhs-radar::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      clip-path: polygon(50% 50%, 50% 0, 100% 0, 100% 100%);
      animation: rotate 4s linear infinite;
    }

    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .fhs-val { font-size: 42px; font-weight: 800; font-family: 'JetBrains Mono'; }

    /* ── GRILLE DE MÉTRIQUES ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .m-card {
      background: var(--bg);
      padding: 20px;
      transition: background 0.3s;
    }

    .m-card:hover { background: var(--surface); }
    .m-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
    .m-val { font-family: 'JetBrains Mono'; font-size: 20px; font-weight: 700; }

    /* ── NARRATIVE BOX ── */
    .narrative-box {
      background: var(--surface);
      border-left: 2px solid var(--accent);
      padding: 24px;
      line-height: 1.6;
      font-size: 14px;
    }

    /* ── RIGHT : TELEMETRY ── */
    .telemetry {
      border-left: 1px solid var(--border);
      background: rgba(10, 10, 12, 0.5);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .t-section-title {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .t-section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

    .alert-item {
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 11px;
      border-left: 3px solid transparent;
    }
    .alert-item.critical { background: rgba(255, 62, 62, 0.1); border-color: var(--red); color: #ff9999; }
    .alert-item.info { background: rgba(0, 112, 255, 0.1); border-color: var(--blue); color: #99c2ff; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  </style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-box">Δ</div>
    <div>
      <div style="font-weight: 800; font-size: 16px; letter-spacing: -0.02em;">0xDELTA</div>
      <div class="mono" style="font-size: 9px; color: var(--text-dim);">FIELD INTELLIGENCE UNIT</div>
    </div>
  </div>
  <div class="status-ticker mono">
    <div class="status-item"><span>●</span> SYSTEM: ONLINE</div>
    <div class="status-item"><span>●</span> STREAM: ACTIVE</div>
    <div id="top-updated" class="status-item">LAST SCAN: --</div>
  </div>
</header>

<div class="main-grid">
  <aside class="sidebar">
    <div class="sidebar-label">
      <span>Watchlist</span>
      <span id="top-count" class="mono" style="color: var(--accent);">--</span>
    </div>
    <div class="token-list" id="sidebar-list">
      </div>
  </aside>

  <main class="content-area" id="detail-panel">
    <div style="height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-ghost);">
      [ SELECTIONNER UN MODULE DE DONNÉES ]
    </div>
  </main>

  <aside class="telemetry" id="right-panel">
    <div>
      <div class="t-section-title">Live Alerts</div>
      <div id="alert-container">
        </div>
    </div>
    <div>
      <div class="t-section-title">Supply Control</div>
      <div id="holder-container">
        </div>
    </div>
  </aside>
</div>

<script>
let allTokens = [];
let selected = null;

const colorForFHS = v => v >= 7 ? 'var(--accent)' : v >= 5 ? 'var(--yellow)' : 'var(--red)';

function renderSidebar(tokens) {
  const el = document.getElementById('sidebar-list');
  el.innerHTML = tokens.map((t, i) => `
    <div class="token-item ${selected === t.symbol ? 'active' : ''}" onclick="selectToken(${i})">
      <div>
        <div class="token-name">${t.symbol}</div>
        <div class="token-meta mono">${t.phase}</div>
      </div>
      <div class="token-score" style="color: ${colorForFHS(t.fhs)}">${t.fhs.toFixed(1)}</div>
    </div>
  `).join('');
}

function selectToken(idx) {
  const t = allTokens[idx];
  selected = t.symbol;
  renderSidebar(allTokens);
  renderDetail(t);
  renderTelemetry(t);
}

function renderDetail(t) {
  const panel = document.getElementById('detail-panel');
  const color = colorForFHS(t.fhs);
  
  panel.innerHTML = `
    <div class="intel-header">
      <div class="intel-title">
        <div class="mono" style="color: var(--accent); font-size: 12px; margin-bottom: 8px;">// SUBJECT_ANALYSIS</div>
        <h1>${t.symbol}</h1>
        <div class="addr-pill mono">${t.address}</div>
      </div>
      <div class="fhs-radar">
        <div class="mono" style="font-size: 9px; color: var(--text-dim); position: absolute; top: 15px;">HEALTH</div>
        <div class="fhs-val" style="color: ${color}">${t.fhs}</div>
        <div class="mono" style="font-size: 9px; color: var(--text-dim); position: absolute; bottom: 15px;">/ 10.0</div>
      </div>
    </div>

    <div class="metrics-grid">
      <div class="m-card">
        <div class="m-label">NBP 24H</div>
        <div class="m-val" style="color: ${t.nbp >= 0 ? 'var(--accent)' : 'var(--red)'}">${t.nbp}%</div>
      </div>
      <div class="m-card">
        <div class="m-label">ICR Index</div>
        <div class="m-val">${t.icr}</div>
      </div>
      <div class="m-card">
        <div class="m-label">Liquidity Coverage</div>
        <div class="m-val">${t.lcr}%</div>
      </div>
      <div class="m-card">
        <div class="m-label">Confidence</div>
        <div class="m-val">${t.phase_confidence}%</div>
      </div>
    </div>

    <div class="narrative-box">
      <div class="mono" style="font-size: 10px; color: var(--accent); margin-bottom: 15px;">[ NARRATIVE_INSIGHT ]</div>
      <p>${t.narrative_phase}</p>
      <p style="margin-top: 15px; color: var(--text-dim);">${t.narrative_insight || ''}</p>
    </div>
  `;
}

function renderTelemetry(t) {
  const alertContainer = document.getElementById('alert-container');
  const holderContainer = document.getElementById('holder-container');

  alertContainer.innerHTML = (t.alerts || []).map(a => `
    <div class="alert-item ${a.severity === 'critical' ? 'critical' : 'info'}">
      <div class="mono" style="font-weight: 700; margin-bottom: 4px;">${a.code}</div>
      <div>${a.message}</div>
    </div>
  `).join('') || '<div class="mono" style="color: var(--text-ghost)">NO_THREATS_DETECTED</div>';

  holderContainer.innerHTML = (t.top20_holders || []).slice(0, 5).map(h => `
    <div style="margin-bottom: 12px;">
      <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px;">
        <span class="mono">${h.address.slice(0,12)}...</span>
        <span class="mono">${h.pct_supply}%</span>
      </div>
      <div style="height: 2px; background: var(--border); width: 100%;">
        <div style="height: 100%; background: var(--blue); width: ${h.pct_supply}%"></div>
      </div>
    </div>
  `).join('');
}

async function loadMemory() {
  try {
    const res = await fetch('memory.json?' + Date.now());
    const data = await res.json();
    allTokens = data.tokens.sort((a, b) => b.fhs - a.fhs);
    
    document.getElementById('top-updated').textContent = 'SCAN: ' + new Date(data.updated_at).toLocaleTimeString();
    document.getElementById('top-count').textContent = allTokens.length + ' UNIT(S)';
    
    renderSidebar(allTokens);
    if (!selected) selectToken(0);
  } catch (e) { console.error("Data error", e); }
}

loadMemory();
setInterval(loadMemory, 30000);
</script>
</body>
</html>
